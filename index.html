<!DOCTYPE html>
<html lang="en">
<head>

        .cashout-btn {

<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        function BuildingCrashGamePro() {
            const [balance, setBalance] = useState(1000);
            const [betAmount, setBetAmount] = useState(100);
            const [autoCashout, setAutoCashout] = useState(2.0);
            const [multiplier, setMultiplier] = useState(1.0);
            const [isRunning, setIsRunning] = useState(false);
            const [hasCrashed, setHasCrashed] = useState(false);
            const [cashoutMultiplier, setCashoutMultiplier] = useState(null);
            const [crashPoint, setCrashPoint] = useState(null);
            const [goldenRound, setGoldenRound] = useState(false);
            const [gamePhase, setGamePhase] = useState('idle');
            const [showResult, setShowResult] = useState(false);
            const [history, setHistory] = useState([1.45, 2.33, 5.21, 1.12, 3.45, 1.89, 2.67, 4.21]);
            const [feed, setFeed] = useState([
                { id: 1, text: "Player won 2.45x - $245", type: "cashout" },
                { id: 2, text: "Player lost at 1.21x", type: "crash" },
                { id: 3, text: "Player won 4.10x - $820", type: "cashout" },
            ]);

            // New state for modals
            const [showDeposit, setShowDeposit] = useState(false);
            const [showWithdraw, setShowWithdraw] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [depositAmount, setDepositAmount] = useState(100);
            const [withdrawAmount, setWithdrawAmount] = useState(100);
            const [transactions, setTransactions] = useState([
                { id: 1, type: 'deposit', amount: 500, date: '2024-01-15' },
                { id: 2, type: 'withdraw', amount: 200, date: '2024-01-14' },
                { id: 3, type: 'deposit', amount: 1000, date: '2024-01-13' },
            ]);

            // Settings state
            const [soundEnabled, setSoundEnabled] = useState(true);
            const [musicEnabled, setMusicEnabled] = useState(false);
            const [animationsEnabled, setAnimationsEnabled] = useState(true);
            const [language, setLanguage] = useState('english');
            const [currency, setCurrency] = useState('USD');

            const intervalRef = useRef(null);
            const currentMultiplierRef = useRef(1.0);
            const gameActiveRef = useRef(false);
            const betAmountRef = useRef(100);
            const autoCashoutRef = useRef(2.0);
            const cashoutTriggeredRef = useRef(false);
            const consecutiveLossesRef = useRef(0);
            const playerLifetimeProfitRef = useRef(0);

            useEffect(() => {
                return () => {
                    if (intervalRef.current) {
                        clearInterval(intervalRef.current);
                    }
                };
            }, []);

            useEffect(() => {
                betAmountRef.current = betAmount;
            }, [betAmount]);

            useEffect(() => {
                autoCashoutRef.current = autoCashout;
            }, [autoCashout]);

            const safeMultiply = useCallback((a, b) => {
                return Math.round((a * b) * 100) / 100;
            }, []);

            const generateCrashPoint = useCallback(() => {
                const betSize = betAmountRef.current;
                const totalBalance = balance;
                const betPercentage = betSize / totalBalance;
                
                let houseEdgeMultiplier = 1.0;
                
                if (betSize > 200) houseEdgeMultiplier *= 0.85;
                if (betSize > 500) houseEdgeMultiplier *= 0.75;
                if (betSize > 1000) houseEdgeMultiplier *= 0.65;
                
                if (betPercentage > 0.2) houseEdgeMultiplier *= 0.9;
                if (betPercentage > 0.4) houseEdgeMultiplier *= 0.8;
                if (betPercentage > 0.6) houseEdgeMultiplier *= 0.7;
                
                if (playerLifetimeProfitRef.current > 500) houseEdgeMultiplier *= 0.9;
                if (playerLifetimeProfitRef.current > 1000) houseEdgeMultiplier *= 0.85;
                if (playerLifetimeProfitRef.current > 2000) houseEdgeMultiplier *= 0.8;
                
                if (consecutiveLossesRef.current > 3) houseEdgeMultiplier *= 1.15;
                if (consecutiveLossesRef.current > 5) houseEdgeMultiplier *= 1.25;
                
                const randomFactor = 0.85 + (Math.random() * 0.3);
                const basePoint = Math.max(1.1, (1 / (1 - Math.random())) * 0.97);
                const adjustedPoint = basePoint * houseEdgeMultiplier * randomFactor;
                
                const goldenChance = Math.max(0.02, 0.12 * (1 - betPercentage));
                const isGolden = Math.random() < goldenChance;
                
                let finalPoint;
                if (isGolden) {
                    const goldenMax = Math.max(5, 50 * (1 - betPercentage));
                    finalPoint = 10 + Math.random() * goldenMax;
                } else {
                    const maxMultiplier = Math.max(3, 10 * (1 - betPercentage * 0.5));
                    finalPoint = Math.min(adjustedPoint, maxMultiplier);
                }
                
                finalPoint = Math.max(1.1, finalPoint);
                
                if (betSize > 500 && Math.random() < 0.15) {
                    finalPoint = Math.min(finalPoint, 1.15 + Math.random() * 0.3);
                }
                
                return {
                    point: Math.round(finalPoint * 100) / 100,
                    isGolden
                };
            }, [balance]);

            const startGame = useCallback(() => {
                if (gameActiveRef.current || isRunning) return;
                if (betAmount <= 0 || betAmount > balance) {
                    alert(betAmount <= 0 ? "Please enter a bet amount" : "Insufficient balance!");
                    return;
                }

                const { point, isGolden } = generateCrashPoint();
                
                currentMultiplierRef.current = 1.0;
                cashoutTriggeredRef.current = false;
                gameActiveRef.current = true;
                
                setCrashPoint(point);
                setGoldenRound(isGolden);
                setBalance(prev => prev - betAmount);
                setMultiplier(1.0);
                setCashoutMultiplier(null);
                setHasCrashed(false);
                setIsRunning(true);
                setGamePhase('running');
                setShowResult(false);

                if (intervalRef.current) {
                    clearInterval(intervalRef.current);
                }

                intervalRef.current = setInterval(() => {
                    if (!gameActiveRef.current) {
                        clearInterval(intervalRef.current);
                        return;
                    }

                    const newMultiplier = Math.round((currentMultiplierRef.current + 0.05) * 100) / 100;
                    currentMultiplierRef.current = newMultiplier;
                    
                    setMultiplier(newMultiplier);

                    if (!cashoutTriggeredRef.current && newMultiplier >= autoCashoutRef.current) {
                        cashoutTriggeredRef.current = true;
                        const winnings = safeMultiply(betAmountRef.current, newMultiplier);
                        
                        clearInterval(intervalRef.current);
                        gameActiveRef.current = false;
                        
                        setBalance(prev => prev + winnings);
                        setCashoutMultiplier(newMultiplier);
                        setIsRunning(false);
                        setGamePhase('cashedout');
                        setShowResult(true);
                        
                        const profit = winnings - betAmountRef.current;
                        playerLifetimeProfitRef.current += profit;
                        consecutiveLossesRef.current = 0;
                        
                        setHistory(prev => [newMultiplier, ...prev].slice(0, 8));
                        
                        setFeed(prev => [{ 
                            id: Date.now(), 
                            text: `Auto-cashout at ${newMultiplier.toFixed(2)}x - Won $${winnings}`, 
                            type: "cashout" 
                        }, ...prev].slice(0, 20));
                        
                        return;
                    }

                    if (newMultiplier >= point) {
                        clearInterval(intervalRef.current);
                        gameActiveRef.current = false;
                        
                        setHasCrashed(true);
                        setIsRunning(false);
                        setGamePhase('crashed');
                        setShowResult(true);
                        
                        playerLifetimeProfitRef.current -= betAmountRef.current;
                        consecutiveLossesRef.current += 1;
                        
                        setHistory(prev => [point, ...prev].slice(0, 8));
                        
                        setFeed(prev => [{ 
                            id: Date.now(), 
                            text: `Crashed at ${point.toFixed(2)}x - Lost $${betAmountRef.current}`, 
                            type: "crash" 
                        }, ...prev].slice(0, 20));
                    }
                }, 100);
            }, [balance, betAmount, autoCashout, isRunning, generateCrashPoint, safeMultiply]);

            const handleCashout = useCallback(() => {
                if (!gameActiveRef.current || !isRunning || cashoutTriggeredRef.current) return;
                
                cashoutTriggeredRef.current = true;
                const currentMultiplier = currentMultiplierRef.current;
                const winnings = safeMultiply(betAmountRef.current, currentMultiplier);
                
                clearInterval(intervalRef.current);
                gameActiveRef.current = false;
                
                setBalance(prev => prev + winnings);
                setCashoutMultiplier(currentMultiplier);
                setIsRunning(false);
                setGamePhase('cashedout');
                setShowResult(true);
                
                const profit = winnings - betAmountRef.current;
                playerLifetimeProfitRef.current += profit;
                consecutiveLossesRef.current = 0;
                
                setHistory(prev => [currentMultiplier, ...prev].slice(0, 8));
                
                setFeed(prev => [{ 
                    id: Date.now(), 
                    text: `Cashed out at ${currentMultiplier.toFixed(2)}x - Won $${winnings}`, 
                    type: "cashout" 
                }, ...prev].slice(0, 20));
            }, [isRunning, safeMultiply]);

            const resetGame = useCallback(() => {
                setShowResult(false);
                setGamePhase('idle');
                setMultiplier(1.0);
                setHasCrashed(false);
                setCashoutMultiplier(null);
                setCrashPoint(null);
                setGoldenRound(false);
            }, []);

            const handleDeposit = () => {
                if (depositAmount > 0) {
                    setBalance(prev => prev + depositAmount);
                    setTransactions(prev => [{
                        id: Date.now(),
                        type: 'deposit',
                        amount: depositAmount,
                        date: new Date().toISOString().split('T')[0]
                    }, ...prev]);
                    setShowDeposit(false);
                    setDepositAmount(100);
                }
            };

            const handleWithdraw = () => {
                if (withdrawAmount > 0 && withdrawAmount <= balance) {
                    setBalance(prev => prev - withdrawAmount);
                    setTransactions(prev => [{
                        id: Date.now(),
                        type: 'withdraw',
                        amount: withdrawAmount,
                        date: new Date().toISOString().split('T')[0]
                    }, ...prev]);
                    setShowWithdraw(false);
                    setWithdrawAmount(100);
                } else {
                    alert('Insufficient balance!');
                }
            };

            const quickBets = [10, 25, 50, 100, 250, 500];
            const buildingHeight = isRunning ? Math.min(multiplier * 35, 370) : 0;

            return (
                <>
                    {/* Top Navigation Bar */}
                    <div className="top-nav">
                        <div className="nav-left">
                            <div className="nav-logo">🎮 Crash Game</div>
                            <div className="nav-balance">
                                <span>💰</span>
                                <span className="nav-balance-amount">${balance.toFixed(2)}</span>
                            </div>
                        </div>
                        <div className="nav-right">
                            <button className="nav-btn deposit-btn" onClick={() => setShowDeposit(true)}>
                                + Deposit
                            </button>
                            <button className="nav-btn withdraw-btn" onClick={() => setShowWithdraw(true)}>
                                - Withdraw
                            </button>
                            <button className="nav-btn settings-btn" onClick={() => setShowSettings(true)}>
                                ⚙️
                            </button>
                        </div>
                    </div>

                    {/* Deposit Modal */}
                    {showDeposit && (
                        <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowDeposit(false)}>
                            <div className="modal">
                                <div className="modal-header">
                                    <h2 className="modal-title">💎 Deposit Funds</h2>
                                    <button className="modal-close" onClick={() => setShowDeposit(false)}>×</button>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Amount ($)</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={depositAmount}
                                        onChange={(e) => setDepositAmount(Math.max(0, Number(e.target.value)))}
                                        placeholder="Enter amount"
                                    />
                                </div>
                                <div className="quick-amounts">
                                    {[50, 100, 250, 500, 1000, 5000].map(amount => (
                                        <button
                                            key={amount}
                                            className="quick-amount-btn"
                                            onClick={() => setDepositAmount(amount)}
                                        >
                                            ${amount}
                                        </button>
                                    ))}
                                </div>
                                <button className="modal-btn primary" onClick={handleDeposit}>
                                    Deposit ${depositAmount}
                                </button>
                                <div className="transaction-history">
                                    <h3 style={{ marginBottom: '12px', color: '#9ca3af' }}>Recent Transactions</h3>
                                    {transactions.slice(0, 5).map(tx => (
                                        <div key={tx.id} className="transaction-item">
                                            <span>{tx.date}</span>
                                            <span className={tx.type === 'deposit' ? 'transaction-deposit' : 'transaction-withdraw'}>
                                                {tx.type === 'deposit' ? '+' : '-'}${tx.amount}
                                            </span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Withdraw Modal */}
                    {showWithdraw && (
                        <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowWithdraw(false)}>
                            <div className="modal">
                                <div className="modal-header">
                                    <h2 className="modal-title">💸 Withdraw Funds</h2>
                                    <button className="modal-close" onClick={() => setShowWithdraw(false)}>×</button>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Available: ${balance.toFixed(2)}</label>
                                    <input
                                        type="number"
                                        className="form-input"
                                        value={withdrawAmount}
                                        onChange={(e) => setWithdrawAmount(Math.max(0, Math.min(balance, Number(e.target.value))))}
                                        placeholder="Enter amount"
                                    />
                                </div>
                                <div className="quick-amounts">
                                    {[50, 100, 250, 500].map(amount => (
                                        <button
                                            key={amount}
                                            className="quick-amount-btn"
                                            onClick={() => setWithdrawAmount(Math.min(amount, balance))}
                                            disabled={amount > balance}
                                        >
                                            ${amount}
                                        </button>
                                    ))}
                                    <button
                                        className="quick-amount-btn"
                                        onClick={() => setWithdrawAmount(balance)}
                                    >
                                        Max
                                    </button>
                                </div>
                                <button 
                                    className="modal-btn danger" 
                                    onClick={handleWithdraw}
                                    disabled={withdrawAmount > balance}
                                >
                                    Withdraw ${withdrawAmount}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="modal-overlay" onClick={(e) => e.target === e.currentTarget && setShowSettings(false)}>
                            <div className="modal">
                                <div className="modal-header">
                                    <h2 className="modal-title">⚙️ Settings</h2>
                                    <button className="modal-close" onClick={() => setShowSettings(false)}>×</button>
                                </div>

                                <div className="settings-section">
                                    <h3 className="settings-title">Audio</h3>
                                    <div className="setting-item">
                                        <div>
                                            <div className="setting-label">Sound Effects</div>
                                            <div className="setting-description">Game sounds and notifications</div>
                                        </div>
                                        <label className="toggle-switch">
                                            <input 
                                                type="checkbox" 
                                                checked={soundEnabled}
                                                onChange={(e) => setSoundEnabled(e.target.checked)}
                                            />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                    <div className="setting-item">
                                        <div>
                                            <div className="setting-label">Background Music</div>
                                            <div className="setting-description">Ambient music during gameplay</div>
                                        </div>
                                        <label className="toggle-switch">
                                            <input 
                                                type="checkbox" 
                                                checked={musicEnabled}
                                                onChange={(e) => setMusicEnabled(e.target.checked)}
                                            />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                </div>

                                <div className="settings-section">
                                    <h3 className="settings-title">Display</h3>
                                    <div className="setting-item">
                                        <div>
                                            <div className="setting-label">Animations</div>
                                            <div className="setting-description">Visual effects and transitions</div>
                                        </div>
                                        <label className="toggle-switch">
                                            <input 
                                                type="checkbox" 
                                                checked={animationsEnabled}
                                                onChange={(e) => setAnimationsEnabled(e.target.checked)}
                                            />
                                            <span className="toggle-slider"></span>
                                        </label>
                                    </div>
                                </div>

                                <div className="settings-section">
                                    <h3 className="settings-title">Preferences</h3>
                                    <div className="setting-item">
                                        <div>
                                            <div className="setting-label">Language</div>
                                        </div>
                                        <select 
                                            className="select-input"
                                            value={language}
                                            onChange={(e) => setLanguage(e.target.value)}
                                        >
                                            <option value="english">English</option>
                                            <option value="spanish">Spanish</option>
                                            <option value="french">French</option>
                                            <option value="german">German</option>
                                        </select>
                                    </div>
                                    <div className="setting-item">
                                        <div>
                                            <div className="setting-label">Currency</div>
                                        </div>
                                        <select 
                                            className="select-input"
                                            value={currency}
                                            onChange={(e) => setCurrency(e.target.value)}
                                        >
                                            <option value="USD">USD ($)</option>
                                            <option value="EUR">EUR (€)</option>
                                            <option value="GBP">GBP (£)</option>
                                            <option value="JPY">JPY (¥)</option>
                                        </select>
                                    </div>
                                </div>

                                <div className="settings-section">
                                    <h3 className="settings-title">Account</h3>
                                    <div style={{ color: '#9ca3af', fontSize: '14px' }}>
                                        <div className="setting-item">
                                            <span>Total Deposited</span>
                                            <span className="transaction-deposit">
                                                ${transactions.filter(t => t.type === 'deposit').reduce((sum, t) => sum + t.amount, 0)}
                                            </span>
                                        </div>
                                        <div className="setting-item">
                                            <span>Total Withdrawn</span>
                                            <span className="transaction-withdraw">
                                                ${transactions.filter(t => t.type === 'withdraw').reduce((sum, t) => sum + t.amount, 0)}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Main Game */}
                    <div className="game-container">
                        <div className="game-box">
                            <div className="header">
                                <h1 className="title">Building Crash</h1>
                                <div className="status-badge">
                                    <div className={`status-dot ${isRunning ? 'live' : 'waiting'}`} />
                                    <span className="status-text">{isRunning ? 'Live' : 'Waiting'}</span>
                                </div>
                            </div>

                            <div className="balance-box">
                                <div className="balance-row">
                                    <span className="balance-label">Game Balance</span>
                                    <span className="balance-amount">
                                        ${balance.toLocaleString('en-US', { minimumFractionDigits: 2 })}
                                    </span>
                                </div>
                                {gamePhase === 'cashedout' && showResult && (
                                    <div className="profit-message">
                                        +${safeMultiply(betAmount, cashoutMultiplier).toFixed(2)}
                                    </div>
                                )}
                                {gamePhase === 'crashed' && showResult && (
                                    <div className="loss-message">
                                        -${betAmount.toFixed(2)}
                                    </div>
                                )}
                            </div>

                            <div className="quick-bets">
                                {quickBets.map(amount => (
                                    <button
                                        key={amount}
                                        onClick={() => !isRunning && setBetAmount(amount)}
                                        disabled={isRunning}
                                        className={`quick-bet-btn ${betAmount === amount ? 'active' : ''}`}
                                    >
                                        ${amount}
                                    </button>
                                ))}
                            </div>

                            <div className="input-group">
                                <div className="input-wrapper">
                                    <label className="input-label">Bet Amount</label>
                                    <input
                                        type="number"
                                        value={betAmount}
                                        onChange={(e) => setBetAmount(Math.max(0, Number(e.target.value)))}
                                        disabled={isRunning}
                                        className="game-input"
                                    />
                                </div>
                                <div className="input-wrapper">
                                    <label className="input-label">Auto Cashout</label>
                                    <input
                                        type="number"
                                        step="0.1"
                                        min="1.1"
                                        value={autoCashout}
                                        onChange={(e) => setAutoCashout(Math.max(1.1, Number(e.target.value)))}
                                        className="game-input"
                                    />
                                </div>
                            </div>

                            <div className="game-area">
                                <div className="sky">
                                    {[...Array(20)].map((_, i) => (
                                        <div
                                            key={i}
                                            className="star"
                                            style={{
                                                left: `${Math.random() * 100}%`,
                                                top: `${Math.random() * 60}%`,
                                                animationDelay: `${Math.random() * 2}s`,
                                                opacity: Math.random() * 0.5 + 0.3,
                                            }}
                                        />
                                    ))}
                                </div>

                                <div className="ground">
                                    <div className="ground-line" />
                                </div>

                                <div className="building-container">
                                    <div
                                        className={`building ${hasCrashed ? 'crashed' : ''} ${goldenRound ? 'golden' : ''}`}
                                        style={{
                                            height: `${buildingHeight}px`,
                                            transform: `scaleX(${Math.max(0.6, Math.min(multiplier / 10, 1))})`,
                                        }}
                                    />
                                </div>

                                {goldenRound && isRunning && !hasCrashed && (
                                    <div className="golden-banner">
                                        GOLDEN ROUND
                                    </div>
                                )}

                                {isRunning && !hasCrashed && (
                                    <div className="multiplier-display">
                                        {multiplier.toFixed(2)}x
                                    </div>
                                )}

                                {hasCrashed && showResult && (
                                    <div className="crash-overlay">
                                        <span className="crash-emoji">&#128165;</span>
                                        <span className="crash-text">CRASHED!</span>
                                        <span className="crash-point">at {crashPoint?.toFixed(2)}x</span>
                                    </div>
                                )}

                                {gamePhase === 'cashedout' && showResult && !hasCrashed && (
                                    <div className="cashout-overlay">
                                        <span className="cashout-emoji">&#127881;</span>
                                        <span className="cashout-amount">
                                            +${safeMultiply(betAmount, cashoutMultiplier).toFixed(2)}
                                        </span>
                                        <span className="cashout-multiplier">at {cashoutMultiplier?.toFixed(2)}x</span>
                                    </div>
                                )}
                            </div>

                            <div className="buttons-container">
                                <button
                                    onClick={showResult ? resetGame : startGame}
                                    disabled={isRunning || (betAmount > balance || betAmount <= 0)}
                                    className="start-btn"
                                >
                                    {showResult ? 'Play Again' : isRunning ? 'Running...' : 'Place Bet'}
                                </button>

                                <button
                                    onClick={handleCashout}
                                    disabled={!isRunning || cashoutTriggeredRef.current}
                                    className="cashout-btn"
                                >
                                    Cash Out
                                </button>
                            </div>

                            <div className="history-section">
                                <div className="section-title">
                                    <div className="dot blue" />
                                    Recent Rounds
                                </div>
                                <div className="history-list">
                                    {history.map((item, i) => {
                                        let colorClass = 'gray';
                                        if (item >= 10) colorClass = 'purple';
                                        else if (item >= 5) colorClass = 'orange';
                                        else if (item >= 2) colorClass = 'yellow';
                                        
                                        return (
                                            <span key={i} className={`history-item ${colorClass}`}>
                                                {item.toFixed(2)}x
                                            </span>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="feed-section">
                                <div className="section-title">
                                    <div className="dot green pulse" />
                                    Live Feed
                                </div>
                                <div className="feed-list">
                                    {feed.map((item) => (
                                        <div key={item.id} className={`feed-item ${item.type}`}>
                                            <span className="feed-icon">
                                                {item.type === 'cashout' ? '💰' : item.type === 'crash' ? '💥' : 'ℹ️'}
                                            </span>
                                            <span>{item.text}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BuildingCrashGamePro />);
    </script>
</body>
    </html>
