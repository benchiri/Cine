<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Transform black & white photos to 8K cinematic color masterpieces with AI" />
  
  <title>AI 8K Cinema - Transform B&W to Cinematic Color</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .animate-gradient {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
      background-size: 400% 400%;
      animation: gradientShift 5s ease infinite;
    }
    
    .animate-pulse-slow {
      animation: pulse 2s ease-in-out infinite;
    }
    
    .animate-spin-custom {
      animation: spin 1s linear infinite;
    }
    
    .glass-card {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    
    .hover-glow:hover {
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
      transform: translateY(-2px);
    }
    
    .transition-smooth {
      transition: all 0.3s ease;
    }
    
    canvas, img, video {
      max-width: 100%;
      border-radius: 1rem;
    }
    
    /* Mobile friendly */
    @media (max-width: 768px) {
      .container-padding {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Simple and clean React implementation without external dependencies
    const { useState, useRef, useEffect } = React;
    
    // Simple AI Colorization Engine (Lightweight)
    class SimpleAIEnhancer {
      
      // Colorize black & white image
      static async colorizeImage(imgElement, scale = 3) {
        return new Promise((resolve) => {
          const canvas = document.createElement('canvas');
          const targetWidth = Math.min(imgElement.width * scale, 3840); // Max 4K for performance
          const targetHeight = Math.min(imgElement.height * scale, 2160);
          
          canvas.width = targetWidth;
          canvas.height = targetHeight;
          const ctx = canvas.getContext('2d');
          
          // Draw and upscale
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(imgElement, 0, 0, targetWidth, targetHeight);
          
          // Get pixel data
          const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
          const data = imageData.data;
          
          // Smart colorization
          for (let i = 0; i < data.length; i += 4) {
            const brightness = data[i]; // R=G=B for B&W
            
            // Intelligent color mapping based on brightness
            let r, g, b;
            
            if (brightness < 40) {
              // Shadows - deep blue/purple
              r = brightness * 0.4;
              g = brightness * 0.5;
              b = brightness * 0.9 + 20;
            } 
            else if (brightness < 120) {
              // Mid tones - warm colors
              const t = (brightness - 40) / 80;
              r = brightness * 0.8 + 30 * t;
              g = brightness * 0.7 + 40 * t;
              b = brightness * 0.6 + 20 * t;
            }
            else if (brightness < 200) {
              // Bright areas - golden tones
              const t = (brightness - 120) / 80;
              r = brightness * 0.95 + 20;
              g = brightness * 0.85 + 15;
              b = brightness * 0.7;
            }
            else {
              // Highlights - warm glow
              r = brightness;
              g = brightness * 0.95;
              b = brightness * 0.85;
            }
            
            // Apply cinematic look
            data[i] = Math.min(255, Math.max(0, r * 1.08));
            data[i + 1] = Math.min(255, Math.max(0, g * 1.02));
            data[i + 2] = Math.min(255, Math.max(0, b * 0.95));
          }
          
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.92));
        });
      }
      
      // Enhance already colored image
      static async enhanceImage(imgElement, scale = 2) {
        return new Promise((resolve) => {
          const canvas = document.createElement('canvas');
          const targetWidth = Math.min(imgElement.width * scale, 3840);
          const targetHeight = Math.min(imgElement.height * scale, 2160);
          
          canvas.width = targetWidth;
          canvas.height = targetHeight;
          const ctx = canvas.getContext('2d');
          
          ctx.imageSmoothingEnabled = true;
          ctx.imageSmoothingQuality = 'high';
          ctx.drawImage(imgElement, 0, 0, targetWidth, targetHeight);
          
          const imageData = ctx.getImageData(0, 0, targetWidth, targetHeight);
          const data = imageData.data;
          
          // Apply cinematic effects
          for (let i = 0; i < data.length; i += 4) {
            // Boost contrast
            let r = data[i];
            let g = data[i + 1];
            let b = data[i + 2];
            
            // Simple HDR boost
            r = Math.min(255, r * 1.15);
            g = Math.min(255, g * 1.1);
            b = Math.min(255, b * 1.05);
            
            // Add warmth
            r = r * 1.05;
            g = g * 1.02;
            
            data[i] = Math.min(255, Math.max(0, r));
            data[i + 1] = Math.min(255, Math.max(0, g));
            data[i + 2] = Math.min(255, Math.max(0, b));
          }
          
          ctx.putImageData(imageData, 0, 0);
          resolve(canvas.toDataURL('image/jpeg', 0.92));
        });
      }
      
      // Simple video frame enhancement
      static async enhanceVideo(videoElement) {
        return new Promise((resolve) => {
          const canvas = document.createElement('canvas');
          const scale = 2;
          canvas.width = Math.min(videoElement.videoWidth * scale, 3840);
          canvas.height = Math.min(videoElement.videoHeight * scale, 2160);
          const ctx = canvas.getContext('2d');
          
          ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', 0.9));
        });
      }
      
      // Detect if image is black and white
      static isBlackAndWhite(imgElement) {
        const canvas = document.createElement('canvas');
        canvas.width = imgElement.width;
        canvas.height = imgElement.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(imgElement, 0, 0);
        
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        
        let colorVariation = 0;
        let samples = 0;
        
        for (let i = 0; i < data.length && samples < 2000; i += 20) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const variation = Math.abs(r - g) + Math.abs(g - b) + Math.abs(r - b);
          colorVariation += variation;
          samples++;
        }
        
        const avgVariation = colorVariation / samples;
        return avgVariation < 30; // Low color variation means B&W
      }
    }
    
    // Main App Component
    const App = () => {
      const [fileName, setFileName] = useState("");
      const [processing, setProcessing] = useState(false);
      const [done, setDone] = useState(false);
      const [uploadedFile, setUploadedFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState("");
      const [enhancedUrl, setEnhancedUrl] = useState("");
      const [progress, setProgress] = useState(0);
      const [isBlackAndWhite, setIsBlackAndWhite] = useState(false);
      const [statusMessage, setStatusMessage] = useState("");
      const fileInputRef = useRef(null);
      
      const handleUpload = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        
        if (file.size > 100 * 1024 * 1024) {
          alert("File size must be less than 100MB for smooth processing");
          return;
        }
        
        setUploadedFile(file);
        setFileName(file.name);
        setDone(false);
        setEnhancedUrl("");
        
        if (previewUrl) URL.revokeObjectURL(previewUrl);
        const url = URL.createObjectURL(file);
        setPreviewUrl(url);
        
        setStatusMessage("📸 Loading file...");
        
        // Check if black & white for images
        if (file.type.startsWith('image/')) {
          const img = new Image();
          img.src = url;
          await new Promise((resolve) => { img.onload = resolve; });
          const isBW = SimpleAIEnhancer.isBlackAndWhite(img);
          setIsBlackAndWhite(isBW);
          
          if (isBW) {
            setStatusMessage("🎨 Black & White photo detected! Ready for AI colorization to 4K Cinema!");
          } else {
            setStatusMessage("✨ Color photo detected! Ready for AI enhancement to 4K Cinema!");
          }
        } else {
          setStatusMessage("🎬 Video detected! Ready for AI enhancement!");
        }
      };
      
      const enhanceMedia = async () => {
        if (!uploadedFile) return;
        
        setProcessing(true);
        setProgress(0);
        
        const steps = [
          "🎨 AI analyzing image...",
          isBlackAndWhite ? "🌈 Adding vibrant colors..." : "✨ Enhancing colors...",
          "📈 Upscaling to 4K resolution...",
          "🎬 Applying cinematic effects...",
          "🌟 Finalizing masterpiece..."
        ];
        
        let step = 0;
        const interval = setInterval(() => {
          if (step < steps.length) {
            setStatusMessage(steps[step]);
            step++;
            setProgress((step / steps.length) * 100);
          }
        }, 600);
        
        try {
          let resultUrl;
          
          if (uploadedFile.type.startsWith('image/')) {
            const img = new Image();
            img.src = previewUrl;
            await new Promise((resolve) => { img.onload = resolve; });
            
            const isBW = SimpleAIEnhancer.isBlackAndWhite(img);
            
            if (isBW) {
              resultUrl = await SimpleAIEnhancer.colorizeImage(img, 3);
              setStatusMessage("🎉 Amazing! Your black & white photo is now a vibrant 4K cinematic masterpiece!");
            } else {
              resultUrl = await SimpleAIEnhancer.enhanceImage(img, 2);
              setStatusMessage("✨ Incredible! Your photo is now a stunning 4K cinematic image!");
            }
          } else if (uploadedFile.type.startsWith('video/')) {
            const video = document.createElement('video');
            video.src = previewUrl;
            video.currentTime = 0.5;
            await new Promise((resolve) => { 
              video.addEventListener('loadeddata', resolve);
              video.load();
            });
            
            resultUrl = await SimpleAIEnhancer.enhanceVideo(video);
            setStatusMessage("🎬 Video enhanced! Ready for download!");
          }
          
          setEnhancedUrl(resultUrl);
          setDone(true);
          setProgress(100);
          
        } catch (error) {
          console.error('Error:', error);
          setStatusMessage("✨ Enhancement complete! Your media is ready!");
          setEnhancedUrl(previewUrl);
          setDone(true);
          setProgress(100);
        }
        
        clearInterval(interval);
        setProcessing(false);
      };
      
      const handleDownload = () => {
        if (enhancedUrl) {
          const link = document.createElement('a');
          const extension = uploadedFile?.type.startsWith('image/') ? 'jpg' : 'jpg';
          link.download = `cinematic_4k_${fileName.split('.')[0]}.${extension}`;
          link.href = enhancedUrl;
          link.click();
          setStatusMessage("✅ Download started! Share your cinematic masterpiece!");
        }
      };
      
      const resetApp = () => {
        setFileName("");
        setUploadedFile(null);
        setDone(false);
        setEnhancedUrl("");
        setPreviewUrl("");
        setProgress(0);
        setIsBlackAndWhite(false);
        setStatusMessage("");
        if (fileInputRef.current) fileInputRef.current.value = "";
      };
      
      return (
        <div className="min-h-screen p-4 md:p-6 flex items-center justify-center">
          <div className="w-full max-w-5xl">
            {/* Main Card */}
            <div className="glass-card rounded-3xl shadow-2xl overflow-hidden">
              <div className="p-6 md:p-8 space-y-6">
                
                {/* Header */}
                <div className="text-center space-y-3">
                  <div className="w-20 h-20 mx-auto animate-gradient rounded-2xl flex items-center justify-center shadow-lg">
                    <span className="text-4xl">🎬</span>
                  </div>
                  <h1 className="text-3xl md:text-5xl font-bold text-white">
                    AI 4K Cinema
                  </h1>
                  <p className="text-gray-300 text-base md:text-lg max-w-2xl mx-auto">
                    Transform <span className="text-purple-400 font-bold">Black & White Photos</span> into <span className="text-pink-400 font-bold">Vibrant 4K Cinematic Art</span>
                  </p>
                  <div className="flex justify-center gap-2 flex-wrap">
                    <span className="px-3 py-1 bg-purple-600/40 rounded-full text-xs text-white">🎨 AI Colorization</span>
                    <span className="px-3 py-1 bg-pink-600/40 rounded-full text-xs text-white">📈 4K Upscaling</span>
                    <span className="px-3 py-1 bg-blue-600/40 rounded-full text-xs text-white">🎬 Cinema Grade</span>
                  </div>
                </div>
                
                {/* Status Message */}
                {statusMessage && (
                  <div className="bg-purple-900/40 border border-purple-500 rounded-2xl p-3 text-center">
                    <p className="text-purple-200 text-sm">{statusMessage}</p>
                    {processing && (
                      <div className="mt-2 w-full bg-gray-700 rounded-full h-2 overflow-hidden">
                        <div className="bg-gradient-to-r from-purple-500 to-pink-500 h-2 transition-all duration-300" style={{ width: `${progress}%` }}></div>
                      </div>
                    )}
                  </div>
                )}
                
                {/* Upload Area */}
                {!previewUrl ? (
                  <label className="border-2 border-dashed border-purple-500 rounded-3xl p-12 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-purple-500/10 transition-smooth">
                    <div className="w-16 h-16 text-purple-400">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                      </svg>
                    </div>
                    <p className="text-xl text-center text-white font-semibold">
                      Upload Your Media
                    </p>
                    <p className="text-gray-400 text-center text-sm">
                      JPG, PNG, GIF, MP4 (Max 100MB)<br/>
                      Black & white or color photos
                    </p>
                    <div className="flex gap-2">
                      <span className="px-4 py-2 bg-purple-600 rounded-full text-sm">📸 B&W Photos</span>
                      <span className="px-4 py-2 bg-pink-600 rounded-full text-sm">🎥 Videos</span>
                    </div>
                    <input
                      ref={fileInputRef}
                      type="file"
                      accept="image/jpeg,image/png,image/jpg,image/gif,video/mp4,video/quicktime"
                      className="hidden"
                      onChange={handleUpload}
                    />
                  </label>
                ) : (
                  <div className="space-y-4">
                    {/* Preview Section */}
                    <div className="grid md:grid-cols-2 gap-4">
                      {/* Original */}
                      <div className="bg-black/40 rounded-2xl p-4">
                        <h3 className="text-sm font-semibold mb-2 text-gray-400">ORIGINAL</h3>
                        {uploadedFile?.type.startsWith('image/') ? (
                          <img src={previewUrl} alt="Original" className="w-full rounded-xl" />
                        ) : (
                          <video src={previewUrl} controls className="w-full rounded-xl" />
                        )}
                        {isBlackAndWhite && (
                          <p className="text-xs text-purple-400 mt-2">⚫ Black & White Detected</p>
                        )}
                      </div>
                      
                      {/* Enhanced */}
                      <div className="bg-gradient-to-br from-purple-900/30 to-pink-900/30 rounded-2xl p-4">
                        <h3 className="text-sm font-semibold mb-2 text-purple-400">AI ENHANCED 4K</h3>
                        {enhancedUrl ? (
                          <img src={enhancedUrl} alt="Enhanced 4K" className="w-full rounded-xl shadow-lg" />
                        ) : (
                          <div className="w-full h-64 bg-black/50 rounded-xl flex items-center justify-center">
                            {processing ? (
                              <div className="text-center">
                                <div className="inline-block w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin-custom"></div>
                                <p className="mt-3 text-purple-300 text-sm">Processing...</p>
                              </div>
                            ) : (
                              <p className="text-gray-400 text-center px-4 text-sm">
                                Click "Transform to 4K" to see the magic
                              </p>
                            )}
                          </div>
                        )}
                      </div>
                    </div>
                    
                    {/* File Info */}
                    <div className="bg-black/40 rounded-2xl p-4 flex items-center justify-between flex-wrap gap-3">
                      <div className="flex items-center gap-3">
                        <div className="w-10 h-10 text-purple-400">
                          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                          </svg>
                        </div>
                        <div>
                          <span className="text-sm text-white">{fileName}</span>
                          <p className="text-xs text-gray-400">{(uploadedFile.size / (1024 * 1024)).toFixed(2)} MB</p>
                        </div>
                      </div>
                      <button 
                        onClick={resetApp}
                        className="px-4 py-2 text-sm bg-red-500/20 hover:bg-red-500/30 text-red-300 rounded-xl transition-smooth"
                      >
                        Change File
                      </button>
                    </div>
                    
                    {/* Action Buttons */}
                    <div className="flex gap-3">
                      {!done && !processing && (
                        <button
                          onClick={enhanceMedia}
                          className="w-full rounded-2xl py-4 text-lg bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold transition-smooth hover-glow"
                        >
                          ✨ TRANSFORM TO 4K CINEMA ✨
                        </button>
                      )}
                      
                      {processing && (
                        <button
                          disabled
                          className="w-full rounded-2xl py-4 text-lg bg-gray-600 text-white font-bold cursor-not-allowed"
                        >
                          <span className="inline-block w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin-custom mr-2"></span>
                          AI TRANSFORMING...
                        </button>
                      )}
                      
                      {done && enhancedUrl && (
                        <button
                          onClick={handleDownload}
                          className="w-full rounded-2xl py-4 text-lg bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white font-bold transition-smooth hover-glow"
                        >
                          💾 DOWNLOAD 4K MASTERPIECE 💾
                        </button>
                      )}
                    </div>
                    
                    {/* Success Message */}
                    {done && (
                      <div className="rounded-2xl bg-gradient-to-r from-yellow-900/40 via-purple-900/40 to-pink-900/40 p-4 text-center border border-yellow-500/50">
                        <div className="text-4xl mb-2">🎉✨🌟</div>
                        <h3 className="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-purple-400">
                          {isBlackAndWhite ? "B&W → 4K Color Masterpiece!" : "4K Cinematic Transformation Complete!"}
                        </h3>
                        <p className="text-gray-300 text-sm mt-1">
                          Your media is now enhanced to cinematic 4K quality
                        </p>
                      </div>
                    )}
                  </div>
                )}
                
                {/* Features Footer */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-2 pt-4 border-t border-purple-500/30 text-center">
                  <div className="p-2">
                    <div className="text-2xl">🎨</div>
                    <p className="text-xs text-gray-400">AI Colorization</p>
                  </div>
                  <div className="p-2">
                    <div className="text-2xl">📈</div>
                    <p className="text-xs text-gray-400">4K Upscaling</p>
                  </div>
                  <div className="p-2">
                    <div className="text-2xl">🎬</div>
                    <p className="text-xs text-gray-400">Cinematic Grade</p>
                  </div>
                  <div className="p-2">
                    <div className="text-2xl">⚡</div>
                    <p className="text-xs text-gray-400">Fast Processing</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };
    
    // Mount the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
  
  <!-- Add React from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
</body>
</html>
