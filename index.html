<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Game – Demo Simulation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #000; color: #fff; }
        .game-container { min-height: 100vh; background: radial-gradient(ellipse at top, #1a1a3e, #0a0a1a); 
            padding: 10px; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }

        /* Refer banner */
        .refer-banner {
            position: fixed; top: 56px; left: 50%; transform: translateX(-50%);
            background: #000; border: 2px solid #FFD700; border-radius: 8px;
            padding: 6px 16px; z-index: 998; display: flex; align-items: center; gap: 12px;
            font-size: 13px; font-weight: 600; box-shadow: 0 0 10px rgba(255,215,0,0.3);
            max-width: 600px; width: 90%;
        }
        .refer-banner span { color: #fff; }
        .refer-code { color: #FFD700; background: #1a1a1a; padding: 2px 8px; border-radius: 4px; }
        .refer-btn { background: #FFD700; color: #000; border: none; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .refer-close { background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px; margin-left: auto; }

        .top-nav { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,30,0.95);
            backdrop-filter: blur(20px); padding: 6px 12px; display: flex; justify-content: space-between; 
            align-items: center; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .nav-logo { font-size: 18px; font-weight: 800; background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-balance { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 12px;
            display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .nav-balance-amount { color: #4ade80; font-weight: 700; }
        .nav-right { display: flex; align-items: center; gap: 6px; }
        .account-toggle { background: rgba(255,255,255,0.1); border-radius: 14px; padding: 2px; display: flex; }
        .account-toggle button { padding: 4px 10px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer;
            font-size: 12px; background: transparent; color: #9ca3af; }
        .account-toggle button.active { background: #2563eb; color: white; }
        .icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .deposit-icon { background: #f59e0b; color: black; }
        .withdraw-icon { background: #10b981; color: white; }
        .settings-icon { background: rgba(255,255,255,0.2); color: white; }

        .game-box { width: 100%; max-width: 480px; background: rgba(20,20,40,0.9); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 16px; border: 1px solid rgba(255,255,255,0.1); margin-top: 10px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .title { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05);
            padding: 4px 10px; border-radius: 12px; font-size: 12px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.countdown { background: #fbbf24; }
        .status-dot.running { background: #4ade80; animation: pulse 1.5s infinite; }
        .status-dot.ended { background: #ef4444; }

        .game-area { position: relative; background: rgba(0,0,0,0.3); border-radius: 16px; height: 340px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px; }
        .sky { position: absolute; inset: 0; background: linear-gradient(to bottom, #0a0a1e, #1a1a3e, #0a0a1e); }
        .ground { position: absolute; bottom: 0; width: 100%; height: 50px;
            background: linear-gradient(to top, #1a1a3e, #2a2a4e); border-top: 2px solid rgba(255,255,255,0.1); }
        .building-container { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); }
        .building { width: 100px; border-radius: 8px 8px 0 0; max-height: 290px;
            transition: height 0.08s linear; transform-origin: bottom center; }
        .building.normal { background: linear-gradient(to top, #1e40af, #3b82f6, #60a5fa); }
        .building.crashed { background: linear-gradient(to top, #991b1b, #dc2626, #ef4444); animation: shake 0.6s; }
        .building.golden { background: linear-gradient(to top, #92400e, #d97706, #fbbf24); }
        .golden-banner { position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: #fbbf24; color: black; padding: 2px 12px; border-radius: 12px; font-weight: 700; font-size: 13px; }
        .multiplier-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 56px; font-weight: 900; color: #fbbf24; }

        .players-panel { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 8px; margin-bottom: 10px;
            max-height: 90px; overflow-y: auto; font-size: 11px; }
        .player-row { display: flex; justify-content: space-between; padding: 2px 0; }

        .bet-controls-bottom { margin-top: 12px; }
        .quick-bets { display: grid; grid-template-columns: repeat(4,1fr); gap: 4px; margin-bottom: 8px; }
        .quick-bet-btn { padding: 6px; border-radius: 8px; border: none; font-size: 11px; font-weight: 600;
            cursor: pointer; color: #9ca3af; background: #1f2937; }
        .quick-bet-btn.active { background: #2563eb; color: white; }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .game-input { width: 100%; padding: 6px 10px; background: #1f2937; border: 1px solid #374151;
            border-radius: 8px; color: white; font-size: 13px; outline: none; }

        .buttons-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .start-btn, .cashout-btn { padding: 10px; border-radius: 10px; border: none; font-size: 14px;
            font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .start-btn { background: linear-gradient(135deg, #059669, #10b981); color: white; }
        .cashout-btn { background: linear-gradient(135deg, #f59e0b, #f97316); color: black; }
        .start-btn:disabled, .cashout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .history-section, .feed-section { margin-bottom: 8px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .history-item { padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }
        .history-item.purple { background: rgba(147,51,234,0.3); color: #c084fc; }
        .history-item.orange { background: rgba(234,88,12,0.3); color: #fb923c; }
        .history-item.yellow { background: rgba(234,179,8,0.3); color: #fbbf24; }
        .feed-list { max-height: 110px; overflow-y: auto; font-size: 11px; }
        .feed-item { padding: 4px 8px; margin-bottom: 2px; border-radius: 6px; display: flex; gap: 6px; }
        .feed-item.cashout { background: rgba(22,163,74,0.15); }
        .feed-item.crash { background: rgba(220,38,38,0.15); }

        .mpesa-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 3000;
        }
        .mpesa-card {
            background: #1a1a1a; border: 2px solid #FFD700; border-radius: 20px; padding: 24px;
            width: 90%; max-width: 360px; text-align: center; color: #fff;
        }
        .mpesa-card h3 { color: #FFD700; margin-bottom: 16px; }
        .mpesa-input {
            width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 10px;
            color: #fff; font-size: 16px; text-align: center; margin: 8px 0; outline: none;
        }
        .mpesa-btn {
            width: 100%; padding: 12px; background: #FFD700; color: #000; border: none; border-radius: 10px;
            font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 12px;
        }
        .mpesa-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .mpesa-processing { font-size: 40px; margin: 20px 0; }
        .mpesa-success { color: #4ade80; font-size: 24px; margin: 10px 0; }

        @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
        @keyframes shake { 0%,100%{transform:translateX(0);} 10%,90%{transform:translateX(-4px);} 20%,80%{transform:translateX(4px);} }
    </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const currencies = { KSH: { symbol: 'KSh', rate: 1, name: 'Kenyan Shilling' }, USD: { symbol: '$', rate: 0.0067, name: 'US Dollar' } };
const fakeUserNames = ['ProGamer254','LuckyStar','BigWinner','CashKing','BetMaster','WinStreak','GoldenHand','RiskTaker','CrashKing','MegaBoss','AcePlayer','SilentWolf','QuickCash','BoltBet','SilverFox'];

function generateFakePlayer() {
    const name = fakeUserNames[Math.floor(Math.random()*fakeUserNames.length)];
    const bets = [1000,2500,5000,7500,10000,12000,15000,20000,25000,34124,40000,50000];
    return { name, bet: bets[Math.floor(Math.random()*bets.length)] };
}

function BuildingCrashGamePro() {
    const [accountMode, setAccountMode] = useState('demo');
    const [demoBalance, setDemoBalance] = useState(5000);
    const [realBalance, setRealBalance] = useState(0);
    const currentBalance = accountMode === 'demo' ? demoBalance : realBalance;
    const [selectedCurrency, setSelectedCurrency] = useState('KSH');
    const cur = currencies[selectedCurrency];
    const format = (amt) => `${cur.symbol} ${amt.toLocaleString()}`;

    const [betAmount, setBetAmount] = useState(1000);
    const [autoCashout, setAutoCashout] = useState(2.0);
    const [roundState, setRoundState] = useState('countdown');
    const [countdown, setCountdown] = useState(10);
    const [multiplier, setMultiplier] = useState(1.0);
    const [crashPoint, setCrashPoint] = useState(null);
    const [goldenRound, setGoldenRound] = useState(false);
    const [hasCrashed, setHasCrashed] = useState(false);
    const [cashedOut, setCashedOut] = useState(false);
    const [cashoutMultiplier, setCashoutMultiplier] = useState(null);
    const [showResultOverlay, setShowResultOverlay] = useState(false);
    const [history, setHistory] = useState([2.15,1.87,3.45,5.21,1.12,2.89,4.21]);
    const [feed, setFeed] = useState([]);
    const [fakePlayers, setFakePlayers] = useState([]);
    const [userBetPlaced, setUserBetPlaced] = useState(false);

    const [referCode, setReferCode] = useState('CRASH' + Math.floor(Math.random()*10000));
    const [showReferBanner, setShowReferBanner] = useState(true);

    const [depositStep, setDepositStep] = useState('hidden');
    const [depositAmount, setDepositAmount] = useState(1000);
    const [depositPhone, setDepositPhone] = useState('07XXXXXXXX');
    const [mpesaPin, setMpesaPin] = useState('');

    const [showSettings, setShowSettings] = useState(false);

    const intervalRef = useRef(null), countdownRef = useRef(null);
    const roundActiveRef = useRef(false), currentMultiplierRef = useRef(1.0), userBetRef = useRef(null);

    const updateBalance = (amt) => {
        if (accountMode === 'demo') setDemoBalance(p => p + amt);
        else setRealBalance(p => p + amt);
    };

    const generateCrashPoint = useCallback(() => {
        const isDemo = accountMode === 'demo';
        let edge = 1.0;
        if (userBetRef.current && !isDemo) {
            if (userBetRef.current.bet > 20000) edge *= 0.85;
            if (userBetRef.current.bet > 50000) edge *= 0.75;
        }
        if (isDemo) edge *= 1.25;
        const rf = 0.85 + Math.random() * 0.3;
        const base = Math.max(1.1, (1 / (1 - Math.random())) * 0.97);
        const adj = base * edge * rf;
        const goldenChance = 0.011;
        const isGolden = Math.random() < goldenChance;
        const final = isGolden ? 15 + Math.random() * 35 : adj;
        return { point: Math.min(Math.max(1.1, Math.round(final*100)/100), 50), isGolden };
    }, [accountMode]);

    const startCountdown = useCallback(() => {
        setRoundState('countdown'); setCountdown(10); setMultiplier(1.0); setHasCrashed(false);
        setCashedOut(false); setCashoutMultiplier(null); setShowResultOverlay(false);
        setUserBetPlaced(false); userBetRef.current = null; currentMultiplierRef.current = 1.0; setGoldenRound(false);
        setFakePlayers(Array.from({length: 8 + Math.floor(Math.random()*10)}, () => generateFakePlayer()));
        countdownRef.current = setInterval(() => {
            setCountdown(prev => {
                if (prev <= 1) { clearInterval(countdownRef.current); startRunning(); return 0; }
                return prev - 1;
            });
        }, 1000);
    }, []);

    const startRunning = useCallback(() => {
        const { point, isGolden } = generateCrashPoint();
        setCrashPoint(point); setGoldenRound(isGolden); setRoundState('running');
        roundActiveRef.current = true; currentMultiplierRef.current = 1.0;
        fakePlayers.forEach(p => {
            if (Math.random() < 0.35) {
                const cashAt = 1.3 + Math.random() * (point - 1.2);
                setTimeout(() => { if (roundActiveRef.current) setFakePlayers(prev => prev.map(fp => fp.name === p.name ? { ...fp, cashout: cashAt.toFixed(2), won: true } : fp)); }, cashAt * 1000);
            }
        });
        intervalRef.current = setInterval(() => {
            if (!roundActiveRef.current) return;
            const mult = Math.round((currentMultiplierRef.current + 0.05)*100)/100;
            currentMultiplierRef.current = mult; setMultiplier(mult);
            if (userBetRef.current && !cashedOut && mult >= userBetRef.current.autoCashout) { handleUserCashout(mult); return; }
            if (mult >= point) {
                clearInterval(intervalRef.current); roundActiveRef.current = false;
                setHasCrashed(true); setRoundState('ended'); setShowResultOverlay(true);
                setHistory(prev => [point, ...prev].slice(0,8));
                setFeed(prev => [{ id: Date.now(), text: `Crashed at ${point.toFixed(2)}x`, type: 'crash' }, ...prev].slice(0,30));
                setTimeout(startCountdown, 4000);
            }
        }, 100);
    }, [fakePlayers, generateCrashPoint, startCountdown]);

    const handleUserCashout = (mult) => {
        if (cashedOut || !userBetRef.current) return;
        clearInterval(intervalRef.current); roundActiveRef.current = false;
        const winnings = Math.round(userBetRef.current.bet * mult);
        updateBalance(winnings);
        setCashoutMultiplier(mult); setCashedOut(true); setRoundState('ended'); setShowResultOverlay(true);
        setHistory(prev => [mult, ...prev].slice(0,8));
        setFeed(prev => [{ id: Date.now(), text: `You cashed ${mult.toFixed(2)}x +${format(winnings)}`, type: 'cashout' }, ...prev].slice(0,30));
        setTimeout(startCountdown, 4000);
    };

    const placeBet = () => {
        if (roundState !== 'countdown') return;
        if (betAmount <= 0 || betAmount > currentBalance) { alert('Invalid bet'); return; }
        updateBalance(-betAmount);
        userBetRef.current = { bet: betAmount, autoCashout: autoCashout };
        setUserBetPlaced(true);
    };

    useEffect(() => { startCountdown(); return () => { clearInterval(intervalRef.current); clearInterval(countdownRef.current); }; }, [accountMode]);

    const openDeposit = () => {
        if (accountMode === 'demo') { alert('Switch to Real account to simulate deposit'); return; }
        setDepositStep('amount');
        setDepositAmount(1000);
        setDepositPhone('07XXXXXXXX');
        setMpesaPin('');
    };

    const goToConfirm = () => {
        if (depositAmount <= 0) return;
        setDepositStep('confirm');
    };

    const processDeposit = () => {
        if (mpesaPin.length < 4) return;
        setDepositStep('processing');
        setTimeout(() => {
            updateBalance(depositAmount);
            setDepositStep('success');
            setTimeout(() => { setDepositStep('hidden'); }, 2000);
        }, 3000);
    };

    const buildingHeight = roundState === 'running' ? Math.min(multiplier * 30, 290) : 0;

    return (
        <>
            <div className="top-nav">
                <div className="nav-left">
                    <div className="nav-logo">🎮 Crash</div>
                    <div className="nav-balance">
                        <span>💰</span><span className="nav-balance-amount">{format(currentBalance)}</span>
                        {accountMode === 'demo' && <span style={{fontSize:10,color:'#aaa'}}>DEMO</span>}
                    </div>
                </div>
                <div className="nav-right">
                    <div className="account-toggle">
                        <button className={accountMode === 'demo' ? 'active' : ''} onClick={() => setAccountMode('demo')}>Demo</button>
                        <button className={accountMode === 'real' ? 'active' : ''} onClick={() => setAccountMode('real')}>Real</button>
                    </div>
                    {accountMode === 'real' && (
                        <>
                            <button className="icon-btn deposit-icon" onClick={openDeposit} title="Deposit">💳</button>
                            <button className="icon-btn withdraw-icon" onClick={() => {
                                const amt = prompt('Enter amount to withdraw:');
                                if (amt && Number(amt) > 0 && Number(amt) <= currentBalance) { updateBalance(-Number(amt)); alert('Withdrawal simulated'); }
                            }} title="Withdraw">💸</button>
                        </>
                    )}
                    {accountMode === 'demo' && (
                        <button className="icon-btn deposit-icon" onClick={() => setDemoBalance(5000)} title="Reset Demo">🔄</button>
                    )}
                    <button className="icon-btn settings-icon" onClick={() => setShowSettings(true)}>⚙️</button>
                </div>
            </div>

            {showReferBanner && (
                <div className="refer-banner">
                    <span>🎁 Refer & Earn <strong>500 KSh</strong></span>
                    <span className="refer-code">Your Code: {referCode}</span>
                    <button className="refer-btn" onClick={() => { navigator.clipboard.writeText(referCode); alert('Referral code copied'); }}>Copy</button>
                    <button className="refer-close" onClick={() => setShowReferBanner(false)}>✕</button>
                </div>
            )}

            {depositStep !== 'hidden' && (
                <div className="mpesa-modal">
                    <div className="mpesa-card">
                        {depositStep === 'amount' && (
                            <>
                                <h3>Deposit via M-Pesa</h3>
                                <input type="number" className="mpesa-input" placeholder="Amount" value={depositAmount} onChange={e => setDepositAmount(Number(e.target.value))} />
                                <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:5, marginTop:8}}>
                                    {[500, 1000, 2500, 5000, 10000].map(a => (
                                        <button key={a} className="quick-bet-btn" onClick={() => setDepositAmount(a)}>{format(a)}</button>
                                    ))}
                                </div>
                                <button className="mpesa-btn" onClick={goToConfirm}>Continue</button>
                                <button style={{background:'none', color:'#aaa', marginTop:8}} onClick={() => setDepositStep('hidden')}>Cancel</button>
                            </>
                        )}
                        {depositStep === 'confirm' && (
                            <>
                                <h3>Confirm Payment</h3>
                                <div style={{fontSize:28, fontWeight:900}}>{format(depositAmount)}</div>
                                <div style={{color:'#aaa', marginBottom:10}}>To: <strong>0792091769</strong></div>
                                <input type="password" className="mpesa-input" placeholder="M-Pesa PIN" value={mpesaPin} onChange={e => setMpesaPin(e.target.value)} maxLength={6} />
                                <button className="mpesa-btn" onClick={processDeposit} disabled={mpesaPin.length < 4}>Send</button>
                                <button style={{background:'none', color:'#aaa', marginTop:8}} onClick={() => setDepositStep('amount')}>Back</button>
                            </>
                        )}
                        {depositStep === 'processing' && (
                            <div>
                                <div className="mpesa-processing">⏳</div>
                                <p>Processing payment...</p>
                                <p style={{color:'#aaa', fontSize:14}}>Check your phone for M-Pesa prompt</p>
                            </div>
                        )}
                        {depositStep === 'success' && (
                            <div>
                                <div style={{fontSize:40}}>✅</div>
                                <div className="mpesa-success">Deposit Successful!</div>
                                <p>+{format(depositAmount)}</p>
                            </div>
                        )}
                    </div>
                </div>
            )}

            {showSettings && (
                <div className="mpesa-modal" onClick={() => setShowSettings(false)}>
                    <div className="mpesa-card">
                        <h3>Settings</h3>
                        <div style={{margin:'15px 0'}}>
                            <label>Currency</label>
                            <select className="mpesa-input" value={selectedCurrency} onChange={e => setSelectedCurrency(e.target.value)}>
                                {Object.entries(currencies).map(([code, cr]) => <option key={code} value={code}>{cr.symbol} - {cr.name}</option>)}
                            </select>
                        </div>
                        <button className="mpesa-btn" onClick={() => setShowSettings(false)}>Close</button>
                    </div>
                </div>
            )}

            <div className="game-container">
                <div className="game-box">
                    <div className="header">
                        <div className="title">Building Crash</div>
                        <div className="status-badge">
                            <div className={`status-dot ${roundState === 'countdown' ? 'countdown' : roundState === 'running' ? 'running' : 'ended'}`} />
                            <span>{roundState === 'countdown' ? `${countdown}s` : roundState === 'running' ? 'LIVE' : 'ENDED'}</span>
                        </div>
                    </div>

                    <div className="game-area">
                        <div className="sky">{Array(20).fill(0).map((_,i) => <div key={i} className="star" style={{left:`${Math.random()*100}%`,top:`${Math.random()*70}%`,width:2,height:2}} />)}</div>
                        <div className="ground" />
                        <div className="building-container">
                            <div className={`building ${hasCrashed ? 'crashed' : goldenRound ? 'golden' : 'normal'}`} style={{height:`${buildingHeight}px`, transform:`scaleX(${Math.max(0.6, Math.min(multiplier/10, 1))})`}} />
                        </div>
                        {goldenRound && roundState === 'running' && !hasCrashed && <div className="golden-banner">⭐ GOLDEN</div>}
                        {roundState === 'running' && !hasCrashed && <div className="multiplier-display">{multiplier.toFixed(2)}x</div>}
                        {hasCrashed && showResultOverlay && (
                            <div style={{position:'absolute',inset:0,background:'rgba(185,28,28,0.7)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
                                <div style={{fontSize:40}}>💥 CRASHED</div>
                                <div>at {crashPoint?.toFixed(2)}x</div>
                            </div>
                        )}
                        {cashedOut && showResultOverlay && (
                            <div style={{position:'absolute',inset:0,background:'rgba(22,163,74,0.7)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
                                <div style={{fontSize:40}}>🎉 +{format(betAmount * cashoutMultiplier)}</div>
                                <div>at {cashoutMultiplier?.toFixed(2)}x</div>
                            </div>
                        )}
                    </div>

                    <div className="buttons-container">
                        {roundState === 'countdown' && !userBetPlaced ? (
                            <button className="start-btn" onClick={placeBet} disabled={betAmount <= 0 || betAmount > currentBalance}>Place Bet</button>
                        ) : roundState === 'countdown' && userBetPlaced ? (
                            <button className="start-btn" disabled>Bet Placed</button>
                        ) : roundState === 'running' && userBetPlaced && !cashedOut ? (
                            <button className="cashout-btn" onClick={() => handleUserCashout(currentMultiplierRef.current)}>Cash Out</button>
                        ) : (
                            <button className="start-btn" disabled>Waiting...</button>
                        )}
                        <button className="cashout-btn" disabled style={{opacity:0.3}}>Spectate</button>
                    </div>

                    <div className="bet-controls-bottom">
                        <div className="input-group">
                            <div>
                                <label style={{color:'#9ca3af',fontSize:12,marginBottom:4,display:'block'}}>Bet Amount</label>
                                <input type="number" className="game-input" value={betAmount} onChange={e => setBetAmount(Math.max(0, Number(e.target.value)))} placeholder="Amount" />
                            </div>
                            <div>
                                <label style={{color:'#9ca3af',fontSize:12,marginBottom:4,display:'block'}}>Auto Cashout</label>
                                <input type="number" step="0.1" className="game-input" value={autoCashout} onChange={e => setAutoCashout(Number(e.target.value))} placeholder="Auto" />
                            </div>
                        </div>
                        <div className="quick-bets">
                            {[500, 1000, 2500, 5000, 10000, 25000].map(amt => (
                                <button key={amt} className={`quick-bet-btn ${betAmount === amt ? 'active' : ''}`} onClick={() => setBetAmount(amt)} disabled={amt > currentBalance}>{format(amt)}</button>
                            ))}
                        </div>
                    </div>

                    <div className="players-panel">
                        <div style={{fontWeight:700, marginBottom:4}}>👥 Players</div>
                        {fakePlayers.map((p,i) => (
                            <div key={i} className="player-row">
                                <span>{p.name}</span><span className="live-user-bet">{format(p.bet)}</span>{p.cashout && <span style={{color: p.won ? '#4ade80' : '#ef4444'}}>{p.cashout}x</span>}
                            </div>
                        ))}
                        {userBetPlaced && (
                            <div className="player-row"><span style={{color:'#fbbf24'}}>You</span><span className="live-user-bet">{format(betAmount)}</span></div>
                        )}
                    </div>

                    <div className="history-section">
                        <div className="section-title"><span style={{color:'#60a5fa'}}>●</span> Recent</div>
                        <div className="history-list">
                            {history.map((h,i) => <span key={i} className={`history-item ${h>=10?'purple':h>=5?'orange':h>=2?'yellow':'gray'}`}>{h.toFixed(2)}x</span>)}
                        </div>
                    </div>
                    <div className="feed-section">
                        <div className="section-title"><span style={{color:'#4ade80'}}>●</span> Live Feed</div>
                        <div className="feed-list">
                            {feed.map(f => <div key={f.id} className={`feed-item ${f.type}`}><span>{f.type==='cashout'?'💰':'💥'}</span> {f.text}</div>)}
                        </div>
                    </div>
                </div>
            </div>
            <div style={{position:'fixed',bottom:10,right:10,color:'#666',fontSize:10}}>Demo simulation – No real money</div>
        </>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BuildingCrashGamePro />);
</script>
</body>
</html>
